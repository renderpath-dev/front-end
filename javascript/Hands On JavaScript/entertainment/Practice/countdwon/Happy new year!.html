<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to 2025 New year</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #000;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #000000, #1a0f3c, #24105c, #1a0f3c, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            opacity: 0.8;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: fixed;
            z-index: 1;
            color: white;
            text-align: center;
            width: 100%;
        }

        #countdown {
            font-size: 180px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0000, 0 0 30px #ff4444, 0 0 40px #ff8888;
            animation: glow 1s ease-in-out infinite alternate;
            transition: transform 0.5s ease;
        }

        #countdown.pulse {
            transform: scale(1.1);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #ff0000, 0 0 30px #ff4444, 0 0 40px #ff8888;
            }
            to {
                text-shadow: 0 0 30px #ff0000, 0 0 40px #ff4444, 0 0 50px #ff8888, 0 0 60px #ff8888;
            }
        }

        #new-year {
            font-size: 100px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: animate 10s linear infinite;
        }

        @keyframes animate {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        #wishes {
            font-size: 24px;
            margin-top: 20px;
            color: #fff;
            text-shadow: 0 0 10px #00ff00;
        }

        .hidden {
            display: none;
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div class="background"></div>
<div class="container">
    <div id="countdown">10</div>
    <div id="new-year" class="hidden">HAPPY NEW YEAR 2025!</div>
    <div id="wishes" class="hidden">
        <p>May your 2025 be filled with joy and success! 🌟</p>
        <p>Wishing you peace, love, and prosperity! ✨</p>
        <p>Here's to new beginnings and beautiful moments! 🎉</p>
    </div>
</div>
<canvas id="fireworks"></canvas>

<script>
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    const countdown = document.getElementById('countdown');
    const newYear = document.getElementById('new-year');
    const wishes = document.getElementById('wishes');

    function setCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    setCanvasSize();
    window.addEventListener('resize', setCanvasSize);

    class Particle {
        constructor(x, y, hue) {
            this.x = x;
            this.y = y;
            this.hue = hue;
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 10 + 2;
            this.velocity = {
                x: Math.cos(angle) * velocity,
                y: Math.sin(angle) * velocity
            };
            this.life = 1;
            this.decay = Math.random() * 0.01 + 0.003;
            this.size = Math.random() * 4 + 2;
            this.gravity = 0.15;
            this.drag = 0.99;
            this.trail = [];
            this.trailLength = 8;
            this.flickerRate = Math.random() * 0.2;
        }

        draw() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for(let i = 0; i < this.trail.length; i++) {
                const pos = this.trail[i];
                const alpha = (i / this.trail.length) * this.life;
                const size = this.size * (i / this.trail.length);

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                const brightness = 60 + Math.random() * 20;
                ctx.fillStyle = `hsla(${this.hue}, 100%, ${brightness}%, ${alpha})`;
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            const flicker = 1 - Math.random() * this.flickerRate;
            ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life * flicker})`;
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.trail.push({x: this.x, y: this.y});
            if(this.trail.length > this.trailLength) {
                this.trail.shift();
            }

            this.velocity.x *= this.drag;
            this.velocity.y *= this.drag;
            this.velocity.y += this.gravity;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.life -= this.decay;
        }
    }

    class Firework {
        constructor(x, y, targetX, targetY) {
            this.x = x;
            this.y = y;
            this.startX = x;
            this.startY = y;
            this.targetX = targetX;
            this.targetY = targetY;
            this.hue = Math.random() * 360;
            this.trail = [];
            this.trailLength = 10;

            const angle = Math.atan2(targetY - y, targetX - x);
            const velocity = 15;
            this.velocity = {
                x: Math.cos(angle) * velocity,
                y: Math.sin(angle) * velocity
            };
        }

        draw() {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';

            for(let i = 0; i < this.trail.length; i++) {
                const pos = this.trail[i];
                const alpha = (i / this.trail.length) * 0.6;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.trail.push({x: this.x, y: this.y});
            if(this.trail.length > this.trailLength) {
                this.trail.shift();
            }

            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.velocity.y += 0.1;
        }
    }

    let particles = [];
    let fireworks = [];
    let lastFirework = Date.now();
    let fireworkInterval = 200;
    const maxFireworks = 8;

    function createParticles(x, y, hue) {
        const particleCount = 200;
        for(let i = 0; i < particleCount; i++) {
            particles.push(new Particle(x, y, hue));
        }
    }

    function autoLaunchFireworks() {
        if (fireworks.length < maxFireworks) {
            const numNew = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < numNew; i++) {
                const startX = Math.random() * canvas.width;
                const startY = canvas.height;
                const targetX = Math.random() * canvas.width;
                const targetY = Math.random() * (canvas.height * 0.65);
                fireworks.push(new Firework(startX, startY, targetX, targetY));
            }
        }
    }

    function animate() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'lighter';

        fireworks = fireworks.filter(firework => {
            firework.update();
            firework.draw();

            if(firework.velocity.y >= 0) {
                createParticles(firework.x, firework.y, firework.hue);
                if(Math.random() < 0.3) {
                    setTimeout(() => {
                        createParticles(
                            firework.x + (Math.random() - 0.5) * 50,
                            firework.y + (Math.random() - 0.5) * 50,
                            (firework.hue + 30) % 360
                        );
                    }, 100);
                }
                return false;
            }
            return true;
        });

        particles = particles.filter(particle => {
            particle.update();
            particle.draw();
            return particle.life > 0;
        });

        if(Date.now() - lastFirework > fireworkInterval) {
            autoLaunchFireworks();
            lastFirework = Date.now();
            fireworkInterval = Math.random() * 200 + 100;
        }

        requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
        const numFireworks = Math.floor(Math.random() * 3) + 2;
        for(let i = 0; i < numFireworks; i++) {
            const offsetX = (Math.random() - 0.5) * 100;
            const startX = e.clientX + offsetX;
            const startY = canvas.height;
            const targetX = e.clientX + offsetX;
            const targetY = e.clientY + (Math.random() - 0.5) * 50;
            fireworks.push(new Firework(startX, startY, targetX, targetY));
        }
    });

    let count = 10;
    function startCountdown() {
        const interval = setInterval(() => {
            if(count > 1) {
                count--;
                countdown.textContent = count;
                countdown.classList.add('pulse');
                setTimeout(() => countdown.classList.remove('pulse'), 500);

                // 每个数字变化时发射一些烟花
                const numFireworks = Math.floor(Math.random() * 2) + 1;
                for(let i = 0; i < numFireworks; i++) {
                    const startX = Math.random() * canvas.width;
                    const targetY = canvas.height * 0.3;
                    fireworks.push(new Firework(startX, canvas.height, startX, targetY));
                }
            } else {
                clearInterval(interval);
                countdown.style.display = 'none';
                newYear.classList.remove('hidden');
                wishes.classList.remove('hidden');
                animate();

                // 倒计时结束时的密集烟花
                fireworkInterval = 100;
                for(let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        autoLaunchFireworks();
                    }, i * 100);
                }
            }
        }, 1000);
    }

    startCountdown();
</script>
</body>
</html>
