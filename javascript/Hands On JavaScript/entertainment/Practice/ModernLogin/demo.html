<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }

    .login-container {
      background-color: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 2rem;
      color: #333;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      background-color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .login-button:hover {
      background-color: #f5f5f5;
    }

    .login-button img {
      width: 24px;
      height: 24px;
      margin-right: 10px;
    }

    .divider {
      margin: 20px 0;
      border-top: 1px solid #ddd;
    }

    .divider-text {
      position: relative;
      text-align: center;
      margin: 20px 0;
    }

    .divider-text:before,
    .divider-text:after {
      content: "";
      position: absolute;
      height: 1px;
      background-color: #ddd;
      top: 50%;
      width: 45%;
    }

    .divider-text:before {
      left: 0;
    }

    .divider-text:after {
      right: 0;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>

    <div class="form-group">

      <input type="password" id="password" name="password" placeholder="Enter your password" required>

    <button type="submit" class="login-button" style="background-color: #007bff; color: white;">
