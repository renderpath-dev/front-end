<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>全球地区选择</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 600px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #34495e;
    }

    select {
      width: 100%;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #3498db, #2c3e50);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 15px;
    }

    .loading {
      text-align: center;
      margin-top: 10px;
      color: #3498db;
      font-weight: bold;
      display: none;
    }

    .result {
      text-align: center;
      margin-top: 25px;
      background: #f0f9ff;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>全球地区选择</h1>
  <form id="regionForm">
    <div class="form-group">
      <label for="country">国家</label>
      <select id="country" required>
        <option value="">加载中...</option>
      </select>
    </div>
    <div class="form-group">
      <label for="state">省份/州</label>
      <select id="state" disabled>
        <option value="">请先选择国家</option>
      </select>
    </div>
    <div class="form-group">
      <label for="city">城市</label>
      <select id="city" disabled>
        <option value="">请先选择省份/州</option>
      </select>
    </div>
    <button type="submit">确认选择</button>
  </form>

  <div class="loading" id="loading">加载中...</div>

  <div class="result" id="result">
    <h3>您选择的地区是：</h3>
    <p id="selectedRegion"></p>
  </div>
</div>

<script>
  const countrySelect = document.getElementById('country');
  const stateSelect = document.getElementById('state');
  const citySelect = document.getElementById('city');
  const resultDiv = document.getElementById('result');
  const selectedRegion = document.getElementById('selectedRegion');
  const loading = document.getElementById('loading');
  let allData = [];

  async function fetchCountriesAndStates() {
    const res = await fetch('https://countriesnow.space/api/v0.1/countries/states');
    const json = await res.json();
    return json.data;
  }

  async function initCountries() {
    loading.style.display = 'block';
    countrySelect.innerHTML = '<option value="">加载中...</option>';
    const countries = await fetchCountriesAndStates();
    allData = countries;

    countrySelect.innerHTML = '<option value="">-- 请选择国家 --</option>';
    countries.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.name;
      opt.textContent = item.name;
      countrySelect.appendChild(opt);
    });

    loading.style.display = 'none';
  }

  countrySelect.addEventListener('change', () => {
    const selected = countrySelect.value;
    stateSelect.disabled = !selected;
    citySelect.disabled = true;
    stateSelect.innerHTML = '<option value="">加载中...</option>';
    citySelect.innerHTML = '<option value="">请先选择省份/州</option>';

    const countryObj = allData.find(c => c.name === selected);
    if (countryObj) {
      stateSelect.innerHTML = '<option value="">-- 请选择省份/州 --</option>';
      countryObj.states.forEach(state => {
        const opt = document.createElement('option');
        opt.value = state.name;
        opt.textContent = state.name;
        stateSelect.appendChild(opt);
      });
    }
  });

  stateSelect.addEventListener('change', async () => {
    const country = countrySelect.value;
    const state = stateSelect.value;
    citySelect.disabled = !state;
    citySelect.innerHTML = '<option value="">加载中...</option>';
    loading.style.display = 'block';

    const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ country, state })
    });
    const json = await res.json();

    citySelect.innerHTML = '<option value="">-- 请选择城市 --</option>';
    json.data.forEach(city => {
      const opt = document.createElement('option');
      opt.value = city;
      opt.textContent = city;
      citySelect.appendChild(opt);
    });

    loading.style.display = 'none';
  });

  document.getElementById('regionForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const country = countrySelect.value;
    const state = stateSelect.value;
    const city = citySelect.value;

    if (!country || !state || !city) {
      alert("请完成所有选择！");
      return;
    }

    selectedRegion.textContent = `${country} / ${state} / ${city}`;
    resultDiv.style.display = 'block';
  });

  // 初始化
  document.addEventListener('DOMContentLoaded', () => {
    initCountries();
  });
</script>
</body>
</html>
