<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1">
    <title>StyLish To-Do list</title>
    <link rel="stylesheet" href="todolist.css">
</head>
<body>
<div class="container">
    <h1>Task Manager</h1>
    <div class="input-container">
            <input type="text" class="taskInput" placeholder="What needs to be done?">
        <button onclick="addTask()">Add Task</button>
    </div>
    <div class="task-Info">
        <span id="taskCounter">0 Tasks,0 Completed</span>
        <button onclick="clearCompletedTasks()" class="clear-btn">Clear Completed</button>
    </div>
    <ul id="taskList"></ul>
    <script src="todolist.js"></script>
</div>
</body>
</html>
