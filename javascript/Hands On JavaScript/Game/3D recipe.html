<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Cloth Receipt</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #e5e5e5;
            --text: #9a9a9a;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
        }

        .wrap {
            width: min(96vw, 900px);
            display: grid;
            place-items: center;
            gap: 14px;
            padding: 18px 0 24px;
        }

        #stage {
            width: min(92vw, 820px);
            height: min(76vh, 720px);
            min-height: 470px;
            display: block;
            touch-action: none;
            cursor: grab;
            border-radius: 10px;
        }

        #stage:active {
            cursor: grabbing;
        }

        .hint {
            text-align: center;
            color: var(--text);
            font-size: 15px;
            line-height: 1.4;
            user-select: none;
        }
    </style>
</head>
<body>
<main class="wrap" aria-label="Interactive paper receipt demo">
    <canvas id="stage"></canvas>
    <div class="hint">Grab and drag the receipt</div>
</main>

<script>
    (() => {
        "use strict";

        const canvas = document.getElementById("stage");
        const gl = canvas.getContext("webgl", {
            antialias: true,
            alpha: true,
            depth: true,
            stencil: false,
            premultipliedAlpha: false
        });

        if (!gl) {
            const ctx = canvas.getContext("2d");
            ctx.font = "18px monospace";
            ctx.fillStyle = "#555";
            ctx.fillText("WebGL is required for this demo.", 30, 50);
            return;
        }

        const W_SEG = 25;
        const H_SEG = 50;
        const COLS = W_SEG + 1;
        const ROWS = H_SEG + 1;
        const WIDTH = 3.0;
        const HEIGHT = 6.0;
        const PARTICLE_COUNT = COLS * ROWS;
        const GRAVITY = -14.0;
        const DAMPING = 0.988;
        const TIMESTEP = 1 / 60;
        const TIMESTEP_SQ = TIMESTEP * TIMESTEP;
        const CONSTRAINT_ITERATIONS = 9;
        const WIND_STRENGTH = 0.18;

        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const previous = new Float32Array(PARTICLE_COUNT * 3);
        const normals = new Float32Array(PARTICLE_COUNT * 3);
        const uvs = new Float32Array(PARTICLE_COUNT * 2);
        const pinned = new Uint8Array(PARTICLE_COUNT);
        const rest = new Float32Array(PARTICLE_COUNT * 3);
        const indices = new Uint16Array(W_SEG * H_SEG * 6);
        const constraints = [];

        const camera = {
            pos: [0, 0.1, 8.7],
            target: [0, -0.4, 0],
            up: [0, 1, 0],
            fov: Math.PI / 4.7,
            near: 0.1,
            far: 80
        };

        let widthPx = 0;
        let heightPx = 0;
        let dpr = 1;
        let projection = mat4();
        let view = mat4();
        let viewProjection = mat4();
        let invViewProjection = mat4();

        let grabbed = -1;
        let grabDepth = 0;
        let grabOffset = [0, 0, 0];
        let grabTarget = [0, 0, 0];
        let pointer = { x: 0, y: 0, active: false };
        let lastTime = performance.now();
        let accumulator = 0;

        initMesh();

        const receiptTextureCanvas = createReceiptTexture();
        const paperTexture = createTexture(receiptTextureCanvas);

        const meshProgram = makeProgram(`
    attribute vec3 aPosition;
    attribute vec3 aNormal;
    attribute vec2 aUv;

    uniform mat4 uViewProjection;
    uniform mat4 uModel;
    uniform vec3 uLightDir;
    uniform vec3 uCamera;

    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorld;
    varying float vRim;

    void main() {
      vec4 world = uModel * vec4(aPosition, 1.0);
      vec3 n = normalize(mat3(uModel) * aNormal);
      vec3 eye = normalize(uCamera - world.xyz);
      vUv = aUv;
      vNormal = n;
      vWorld = world.xyz;
      vRim = pow(1.0 - max(dot(abs(n), eye), 0.0), 2.0);
      gl_Position = uViewProjection * world;
    }
  `, `
    precision highp float;

    uniform sampler2D uTexture;
    uniform vec3 uLightDir;
    uniform vec3 uAmbient;
    uniform vec3 uLightColor;
    uniform float uTime;

    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorld;
    varying float vRim;

    float hash(vec2 p) {
      p = fract(p * vec2(123.34, 456.21));
      p += dot(p, p + 45.32);
      return fract(p.x * p.y);
    }

    void main() {
      vec4 tex = texture2D(uTexture, vUv);
      vec3 n = normalize(vNormal);
      float ndl = max(dot(n, normalize(uLightDir)), 0.0);
      float back = max(dot(-n, normalize(uLightDir)), 0.0) * 0.36;
      float wrap = smoothstep(-0.25, 0.65, dot(n, normalize(uLightDir))) * 0.16;
      float paperGrain = (hash(vUv * vec2(520.0, 980.0)) - 0.5) * 0.055;
      float fold = pow(1.0 - abs(n.z), 1.8) * 0.18;
      float verticalShade = smoothstep(2.8, -3.0, vWorld.y) * 0.08;
      vec3 light = uAmbient + uLightColor * (ndl * 0.82 + back + wrap);
      vec3 color = tex.rgb * light;
      color -= fold;
      color -= verticalShade;
      color += paperGrain;
      color += vRim * 0.045;
      gl_FragColor = vec4(color, tex.a);
    }
  `);

        const shadowProgram = makeProgram(`
    attribute vec3 aPosition;
    uniform mat4 uViewProjection;
    uniform mat4 uShadowModel;
    varying float vAlpha;

    void main() {
      vec4 world = uShadowModel * vec4(aPosition, 1.0);
      float fade = smoothstep(4.2, -3.0, aPosition.y);
      vAlpha = fade;
      gl_Position = uViewProjection * world;
    }
  `, `
    precision mediump float;
    varying float vAlpha;

    void main() {
      gl_FragColor = vec4(0.18, 0.17, 0.15, 0.135 * vAlpha);
    }
  `);

        const indicatorProgram = makeProgram(`
    attribute vec2 aPosition;
    uniform mat4 uViewProjection;
    uniform vec3 uCenter;
    uniform vec3 uRight;
    uniform vec3 uUp;
    uniform float uRadius;
    varying vec2 vLocal;

    void main() {
      vLocal = aPosition;
      vec3 world = uCenter + uRight * aPosition.x * uRadius + uUp * aPosition.y * uRadius;
      gl_Position = uViewProjection * vec4(world, 1.0);
    }
  `, `
    precision mediump float;
    varying vec2 vLocal;

    void main() {
      float d = length(vLocal);
      float ring = smoothstep(1.0, 0.78, d) * smoothstep(0.44, 0.58, d);
      float core = smoothstep(0.55, 0.0, d) * 0.22;
      float alpha = ring * 0.45 + core;
      gl_FragColor = vec4(0.12, 0.12, 0.12, alpha);
    }
  `);

        const meshBuffers = {
            position: gl.createBuffer(),
            normal: gl.createBuffer(),
            uv: gl.createBuffer(),
            index: gl.createBuffer()
        };

        gl.bindBuffer(gl.ARRAY_BUFFER, meshBuffers.uv);
        gl.bufferData(gl.ARRAY_BUFFER, uvs, gl.STATIC_DRAW);
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, meshBuffers.index);
        gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);

        const indicatorBuffer = gl.createBuffer();
        const indicatorVerts = makeDisc(56);
        gl.bindBuffer(gl.ARRAY_BUFFER, indicatorBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, indicatorVerts, gl.STATIC_DRAW);

        const model = identity();
        const shadowModel = makeShadowMatrix();

        gl.enable(gl.DEPTH_TEST);
        gl.enable(gl.CULL_FACE);
        gl.disable(gl.CULL_FACE);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        canvas.addEventListener("pointerdown", onPointerDown);
        canvas.addEventListener("pointermove", onPointerMove);
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);
        window.addEventListener("resize", resize);

        resize();
        requestAnimationFrame(frame);

        function initMesh() {
            let ii = 0;
            for (let y = 0; y < ROWS; y++) {
                const v = y / H_SEG;
                for (let x = 0; x < COLS; x++) {
                    const u = x / W_SEG;
                    const idx = indexOf(x, y);
                    const px = (u - 0.5) * WIDTH;
                    const py = HEIGHT * 0.5 - v * HEIGHT;
                    const pz =
                        Math.sin(u * Math.PI * 2.0) * 0.035 +
                        Math.sin(v * Math.PI * 7.0 + u * 1.8) * 0.018;

                    positions[idx * 3 + 0] = px;
                    positions[idx * 3 + 1] = py;
                    positions[idx * 3 + 2] = pz;
                    previous[idx * 3 + 0] = px;
                    previous[idx * 3 + 1] = py;
                    previous[idx * 3 + 2] = pz;
                    rest[idx * 3 + 0] = px;
                    rest[idx * 3 + 1] = py;
                    rest[idx * 3 + 2] = pz;

                    normals[idx * 3 + 0] = 0;
                    normals[idx * 3 + 1] = 0;
                    normals[idx * 3 + 2] = 1;

                    uvs[idx * 2 + 0] = u;
                    uvs[idx * 2 + 1] = v;

                    if (y === 0) pinned[idx] = 1;
                }
            }

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (x < W_SEG) addConstraint(indexOf(x, y), indexOf(x + 1, y));
                    if (y < H_SEG) addConstraint(indexOf(x, y), indexOf(x, y + 1));
                    if (x < W_SEG && y < H_SEG) {
                        addConstraint(indexOf(x, y), indexOf(x + 1, y + 1));
                        addConstraint(indexOf(x + 1, y), indexOf(x, y + 1));
                    }
                    if (x < W_SEG - 1) addConstraint(indexOf(x, y), indexOf(x + 2, y));
                    if (y < H_SEG - 1) addConstraint(indexOf(x, y), indexOf(x, y + 2));
                }
            }

            for (let y = 0; y < H_SEG; y++) {
                for (let x = 0; x < W_SEG; x++) {
                    const a = indexOf(x, y);
                    const b = indexOf(x + 1, y);
                    const c = indexOf(x, y + 1);
                    const d = indexOf(x + 1, y + 1);
                    indices[ii++] = a;
                    indices[ii++] = c;
                    indices[ii++] = b;
                    indices[ii++] = b;
                    indices[ii++] = c;
                    indices[ii++] = d;
                }
            }
        }

        function indexOf(x, y) {
            return y * COLS + x;
        }

        function addConstraint(a, b) {
            const ax = positions[a * 3], ay = positions[a * 3 + 1], az = positions[a * 3 + 2];
            const bx = positions[b * 3], by = positions[b * 3 + 1], bz = positions[b * 3 + 2];
            const dx = ax - bx, dy = ay - by, dz = az - bz;
            constraints.push({ a, b, len: Math.hypot(dx, dy, dz) });
        }

        function createReceiptTexture() {
            const c = document.createElement("canvas");
            c.width = 1024;
            c.height = 2048;
            const ctx = c.getContext("2d");

            ctx.fillStyle = "#f7f4ea";
            ctx.fillRect(0, 0, c.width, c.height);

            const grain = ctx.getImageData(0, 0, c.width, c.height);
            for (let i = 0; i < grain.data.length; i += 4) {
                const n = (Math.random() - 0.5) * 9;
                grain.data[i + 0] = clamp255(grain.data[i + 0] + n);
                grain.data[i + 1] = clamp255(grain.data[i + 1] + n);
                grain.data[i + 2] = clamp255(grain.data[i + 2] + n);
            }
            ctx.putImageData(grain, 0, 0);

            ctx.save();
            ctx.globalAlpha = 0.18;
            for (let x = 20; x < c.width; x += 17) {
                ctx.strokeStyle = x % 34 === 0 ? "#ece6d7" : "#fffdf5";
                ctx.beginPath();
                ctx.moveTo(x + Math.sin(x) * 1.5, 0);
                ctx.lineTo(x + Math.cos(x) * 1.5, c.height);
                ctx.stroke();
            }
            ctx.restore();

            const left = 110;
            const right = c.width - 110;
            const center = c.width / 2;
            let y = 142;

            ctx.fillStyle = "#242424";
            ctx.textBaseline = "top";
            ctx.lineWidth = 5;
            ctx.lineCap = "butt";

            drawCenter("THE FLORNRM SHOP", y, "bold 54px Menlo, Consolas, monospace");
            y += 78;
            drawCenter("42 Mesh Lane, WebGL City", y, "32px Menlo, Consolas, monospace");
            y += 48;
            drawCenter("Tel: (555) 042-1337", y, "32px Menlo, Consolas, monospace");

            y += 92;
            drawLeft("Date: 2026-02-23  14:17", y, "31px Menlo, Consolas, monospace");
            y += 48;
            drawLeft("Order: #00382", y, "31px Menlo, Consolas, monospace");

            y += 72;
            dashed(y);
            y += 62;

            const items = [
                ["Vertex Shader", "$4.20"],
                ["Fragment Shader", "$3.50"],
                ["Normal Map", "$2.80"],
                ["UV Unwrap", "$1.50"],
                ["Cloth Simulation", "$6.00"]
            ];

            for (const [name, price] of items) {
                drawPair(name, price, y, "31px Menlo, Consolas, monospace");
                y += 52;
            }

            y += 24;
            dashed(y);
            y += 62;

            drawPair("Subtotal", "$18.00", y, "31px Menlo, Consolas, monospace");
            y += 52;
            drawPair("Tax (8%)", "$1.44", y, "31px Menlo, Consolas, monospace");

            y += 70;
            thick(y);
            y += 58;

            drawPair("TOTAL", "$19.44", y, "bold 39px Menlo, Consolas, monospace");

            drawCenter("Thank you for visiting!", 1778, "32px Menlo, Consolas, monospace");
            drawCenter("github.com/flornkm", 1830, "27px Menlo, Consolas, monospace");

            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.strokeStyle = "#bdb8aa";
            ctx.lineWidth = 2;
            ctx.strokeRect(48, 48, c.width - 96, c.height - 96);
            ctx.restore();

            return c;

            function drawCenter(text, yy, font) {
                ctx.font = font;
                ctx.textAlign = "center";
                ctx.fillText(text, center, yy);
            }

            function drawLeft(text, yy, font) {
                ctx.font = font;
                ctx.textAlign = "left";
                ctx.fillText(text, left, yy);
            }

            function drawPair(l, r, yy, font) {
                ctx.font = font;
                ctx.textAlign = "left";
                ctx.fillText(l, left, yy);
                ctx.textAlign = "right";
                ctx.fillText(r, right, yy);
            }

            function dashed(yy) {
                ctx.save();
                ctx.strokeStyle = "#2d2d2d";
                ctx.lineWidth = 4;
                ctx.setLineDash([22, 18]);
                ctx.beginPath();
                ctx.moveTo(left, yy);
                ctx.lineTo(right, yy);
                ctx.stroke();
                ctx.restore();
            }

            function thick(yy) {
                ctx.save();
                ctx.strokeStyle = "#2d2d2d";
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.moveTo(left, yy);
                ctx.lineTo(right, yy);
                ctx.stroke();
                ctx.restore();
            }

            function clamp255(v) {
                return Math.max(0, Math.min(255, v));
            }
        }

        function createTexture(source) {
            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.generateMipmap(gl.TEXTURE_2D);
            return texture;
        }

        function frame(now) {
            const dt = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            accumulator += dt;

            while (accumulator >= TIMESTEP) {
                stepPhysics(now * 0.001);
                accumulator -= TIMESTEP;
            }

            updateNormals();
            render(now * 0.001);
            requestAnimationFrame(frame);
        }

        function stepPhysics(time) {
            const wind = Math.sin(time * 1.4) * WIND_STRENGTH + Math.sin(time * 2.15 + 1.6) * 0.08;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = i * 3;
                if (pinned[i]) {
                    positions[p + 0] = rest[p + 0];
                    positions[p + 1] = rest[p + 1];
                    positions[p + 2] = rest[p + 2];
                    previous[p + 0] = rest[p + 0];
                    previous[p + 1] = rest[p + 1];
                    previous[p + 2] = rest[p + 2];
                    continue;
                }

                if (i === grabbed) {
                    positions[p + 0] += (grabTarget[0] - positions[p + 0]) * 0.64;
                    positions[p + 1] += (grabTarget[1] - positions[p + 1]) * 0.64;
                    positions[p + 2] += (grabTarget[2] - positions[p + 2]) * 0.64;
                    previous[p + 0] = positions[p + 0];
                    previous[p + 1] = positions[p + 1];
                    previous[p + 2] = positions[p + 2];
                    continue;
                }

                const x = positions[p + 0];
                const y = positions[p + 1];
                const z = positions[p + 2];

                let vx = (x - previous[p + 0]) * DAMPING;
                let vy = (y - previous[p + 1]) * DAMPING;
                let vz = (z - previous[p + 2]) * DAMPING;

                previous[p + 0] = x;
                previous[p + 1] = y;
                previous[p + 2] = z;

                const row = Math.floor(i / COLS);
                const flutter = Math.sin(time * 2.2 + row * 0.22 + positions[p + 0] * 1.7) * 0.18;
                const forceX = wind * (row / H_SEG) * 0.7;
                const forceZ = (wind + flutter) * (0.2 + row / H_SEG) * 1.15;

                positions[p + 0] = x + vx + forceX * TIMESTEP_SQ;
                positions[p + 1] = y + vy + GRAVITY * TIMESTEP_SQ;
                positions[p + 2] = z + vz + forceZ * TIMESTEP_SQ;
            }

            for (let iter = 0; iter < CONSTRAINT_ITERATIONS; iter++) {
                for (let c = 0; c < constraints.length; c++) {
                    satisfy(constraints[c]);
                }

                if (grabbed >= 0) {
                    const p = grabbed * 3;
                    positions[p + 0] += (grabTarget[0] - positions[p + 0]) * 0.72;
                    positions[p + 1] += (grabTarget[1] - positions[p + 1]) * 0.72;
                    positions[p + 2] += (grabTarget[2] - positions[p + 2]) * 0.72;
                }

                for (let x = 0; x < COLS; x++) {
                    const i = indexOf(x, 0) * 3;
                    positions[i + 0] = rest[i + 0];
                    positions[i + 1] = rest[i + 1];
                    positions[i + 2] = rest[i + 2];
                }
            }
        }

        function satisfy(c) {
            const a = c.a * 3;
            const b = c.b * 3;

            let dx = positions[b + 0] - positions[a + 0];
            let dy = positions[b + 1] - positions[a + 1];
            let dz = positions[b + 2] - positions[a + 2];
            let dist = Math.hypot(dx, dy, dz);
            if (dist < 1e-7) return;

            const diff = (dist - c.len) / dist;
            const axPinned = pinned[c.a] || c.a === grabbed;
            const bxPinned = pinned[c.b] || c.b === grabbed;
            const stiffness = c.len > WIDTH / W_SEG * 1.5 ? 0.43 : 0.58;

            if (axPinned && bxPinned) return;

            if (axPinned) {
                positions[b + 0] -= dx * diff * stiffness;
                positions[b + 1] -= dy * diff * stiffness;
                positions[b + 2] -= dz * diff * stiffness;
            } else if (bxPinned) {
                positions[a + 0] += dx * diff * stiffness;
                positions[a + 1] += dy * diff * stiffness;
                positions[a + 2] += dz * diff * stiffness;
            } else {
                const half = 0.5 * stiffness;
                positions[a + 0] += dx * diff * half;
                positions[a + 1] += dy * diff * half;
                positions[a + 2] += dz * diff * half;
                positions[b + 0] -= dx * diff * half;
                positions[b + 1] -= dy * diff * half;
                positions[b + 2] -= dz * diff * half;
            }
        }

        function updateNormals() {
            normals.fill(0);

            for (let i = 0; i < indices.length; i += 3) {
                const ia = indices[i] * 3;
                const ib = indices[i + 1] * 3;
                const ic = indices[i + 2] * 3;

                const ax = positions[ia], ay = positions[ia + 1], az = positions[ia + 2];
                const bx = positions[ib], by = positions[ib + 1], bz = positions[ib + 2];
                const cx = positions[ic], cy = positions[ic + 1], cz = positions[ic + 2];

                const abx = bx - ax, aby = by - ay, abz = bz - az;
                const acx = cx - ax, acy = cy - ay, acz = cz - az;

                const nx = aby * acz - abz * acy;
                const ny = abz * acx - abx * acz;
                const nz = abx * acy - aby * acx;

                normals[ia] += nx; normals[ia + 1] += ny; normals[ia + 2] += nz;
                normals[ib] += nx; normals[ib + 1] += ny; normals[ib + 2] += nz;
                normals[ic] += nx; normals[ic + 1] += ny; normals[ic + 2] += nz;
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = i * 3;
                const nx = normals[p], ny = normals[p + 1], nz = normals[p + 2];
                const len = Math.hypot(nx, ny, nz) || 1;
                normals[p] = nx / len;
                normals[p + 1] = ny / len;
                normals[p + 2] = nz / len;
            }
        }

        function render(time) {
            gl.viewport(0, 0, widthPx, heightPx);
            gl.clearColor(0.898, 0.898, 0.898, 1);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            lookAt(view, camera.pos, camera.target, camera.up);
            perspective(projection, camera.fov, widthPx / heightPx, camera.near, camera.far);
            multiply(viewProjection, projection, view);
            invert(invViewProjection, viewProjection);

            gl.bindBuffer(gl.ARRAY_BUFFER, meshBuffers.position);
            gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
            gl.bindBuffer(gl.ARRAY_BUFFER, meshBuffers.normal);
            gl.bufferData(gl.ARRAY_BUFFER, normals, gl.DYNAMIC_DRAW);

            drawShadow();
            drawReceipt(time);
            if (grabbed >= 0) drawIndicator();
        }

        function drawReceipt(time) {
            gl.useProgram(meshProgram.program);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, paperTexture);

            bindAttrib(meshProgram, "aPosition", meshBuffers.position, 3);
            bindAttrib(meshProgram, "aNormal", meshBuffers.normal, 3);
            bindAttrib(meshProgram, "aUv", meshBuffers.uv, 2);

            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, meshBuffers.index);
            gl.uniformMatrix4fv(meshProgram.uniforms.uViewProjection, false, viewProjection);
            gl.uniformMatrix4fv(meshProgram.uniforms.uModel, false, model);
            gl.uniform3f(meshProgram.uniforms.uLightDir, -0.45, 0.72, 0.54);
            gl.uniform3f(meshProgram.uniforms.uCamera, camera.pos[0], camera.pos[1], camera.pos[2]);
            gl.uniform3f(meshProgram.uniforms.uAmbient, 0.54, 0.53, 0.50);
            gl.uniform3f(meshProgram.uniforms.uLightColor, 0.78, 0.75, 0.68);
            gl.uniform1f(meshProgram.uniforms.uTime, time);
            gl.uniform1i(meshProgram.uniforms.uTexture, 0);

            gl.disable(gl.CULL_FACE);
            gl.depthMask(true);
            gl.drawElements(gl.TRIANGLES, indices.length, gl.UNSIGNED_SHORT, 0);
        }

        function drawShadow() {
            gl.useProgram(shadowProgram.program);
            bindAttrib(shadowProgram, "aPosition", meshBuffers.position, 3);

            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, meshBuffers.index);
            gl.uniformMatrix4fv(shadowProgram.uniforms.uViewProjection, false, viewProjection);
            gl.uniformMatrix4fv(shadowProgram.uniforms.uShadowModel, false, shadowModel);

            gl.enable(gl.BLEND);
            gl.depthMask(false);
            gl.drawElements(gl.TRIANGLES, indices.length, gl.UNSIGNED_SHORT, 0);
            gl.depthMask(true);
        }

        function drawIndicator() {
            const p = grabbed * 3;
            const center = [
                positions[p + 0],
                positions[p + 1],
                positions[p + 2] + 0.035
            ];

            const right = [view[0], view[4], view[8]];
            const up = [view[1], view[5], view[9]];

            gl.useProgram(indicatorProgram.program);
            gl.bindBuffer(gl.ARRAY_BUFFER, indicatorBuffer);
            bindAttrib(indicatorProgram, "aPosition", indicatorBuffer, 2);
            gl.uniformMatrix4fv(indicatorProgram.uniforms.uViewProjection, false, viewProjection);
            gl.uniform3f(indicatorProgram.uniforms.uCenter, center[0], center[1], center[2]);
            gl.uniform3f(indicatorProgram.uniforms.uRight, right[0], right[1], right[2]);
            gl.uniform3f(indicatorProgram.uniforms.uUp, up[0], up[1], up[2]);
            gl.uniform1f(indicatorProgram.uniforms.uRadius, 0.22);

            gl.depthMask(false);
            gl.drawArrays(gl.TRIANGLE_FAN, 0, indicatorVerts.length / 2);
            gl.depthMask(true);
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            dpr = Math.min(2, window.devicePixelRatio || 1);
            widthPx = Math.max(1, Math.round(rect.width * dpr));
            heightPx = Math.max(1, Math.round(rect.height * dpr));
            if (canvas.width !== widthPx || canvas.height !== heightPx) {
                canvas.width = widthPx;
                canvas.height = heightPx;
            }
        }

        function onPointerDown(e) {
            resize();
            canvas.setPointerCapture(e.pointerId);
            pointer.active = true;
            updatePointer(e);
            const ray = pointerRay(pointer.x, pointer.y);
            const hit = raycastReceipt(ray);

            let candidate = -1;
            if (hit) {
                let best = Infinity;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    if (pinned[i]) continue;
                    const p = i * 3;
                    const dx = positions[p] - hit[0];
                    const dy = positions[p + 1] - hit[1];
                    const dz = positions[p + 2] - hit[2];
                    const d = dx * dx + dy * dy + dz * dz;
                    if (d < best) {
                        best = d;
                        candidate = i;
                    }
                }
            } else {
                let best = 0.16;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    if (pinned[i]) continue;
                    const p = i * 3;
                    const d = distancePointToRay([positions[p], positions[p + 1], positions[p + 2]], ray.origin, ray.dir);
                    if (d < best) {
                        best = d;
                        candidate = i;
                    }
                }
            }

            if (candidate >= 0) {
                grabbed = candidate;
                const p = grabbed * 3;
                const current = [positions[p], positions[p + 1], positions[p + 2]];
                const clip = project(current);
                grabDepth = clip.depth;
                const target = unproject(pointer.x, pointer.y, grabDepth);
                grabOffset = [current[0] - target[0], current[1] - target[1], current[2] - target[2]];
                grabTarget = current.slice();
                canvas.style.cursor = "grabbing";
            }
        }

        function onPointerMove(e) {
            updatePointer(e);
            if (grabbed >= 0) {
                const p = unproject(pointer.x, pointer.y, grabDepth);
                grabTarget[0] = p[0] + grabOffset[0];
                grabTarget[1] = p[1] + grabOffset[1];
                grabTarget[2] = p[2] + grabOffset[2];
            }
        }

        function onPointerUp(e) {
            pointer.active = false;
            if (grabbed >= 0) {
                const p = grabbed * 3;
                previous[p + 0] = positions[p + 0] - (grabTarget[0] - positions[p + 0]) * 0.08;
                previous[p + 1] = positions[p + 1] - (grabTarget[1] - positions[p + 1]) * 0.08;
                previous[p + 2] = positions[p + 2] - (grabTarget[2] - positions[p + 2]) * 0.08;
            }
            grabbed = -1;
            canvas.style.cursor = "grab";
            try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
        }

        function updatePointer(e) {
            const rect = canvas.getBoundingClientRect();
            pointer.x = (e.clientX - rect.left) * dpr;
            pointer.y = (e.clientY - rect.top) * dpr;
        }

        function pointerRay(px, py) {
            const x = (px / widthPx) * 2 - 1;
            const y = 1 - (py / heightPx) * 2;
            const near = transformPoint(invViewProjection, [x, y, -1]);
            const far = transformPoint(invViewProjection, [x, y, 1]);
            const dir = normalize3([far[0] - near[0], far[1] - near[1], far[2] - near[2]]);
            return { origin: near, dir };
        }

        function raycastReceipt(ray) {
            let closestT = Infinity;
            let closest = null;

            for (let i = 0; i < indices.length; i += 3) {
                const a = getPos(indices[i]);
                const b = getPos(indices[i + 1]);
                const c = getPos(indices[i + 2]);
                const t = intersectTriangle(ray.origin, ray.dir, a, b, c);
                if (t !== null && t < closestT) {
                    closestT = t;
                    closest = [
                        ray.origin[0] + ray.dir[0] * t,
                        ray.origin[1] + ray.dir[1] * t,
                        ray.origin[2] + ray.dir[2] * t
                    ];
                }
            }

            return closest;
        }

        function getPos(i) {
            const p = i * 3;
            return [positions[p], positions[p + 1], positions[p + 2]];
        }

        function intersectTriangle(origin, dir, a, b, c) {
            const EPS = 1e-6;
            const e1 = [b[0] - a[0], b[1] - a[1], b[2] - a[2]];
            const e2 = [c[0] - a[0], c[1] - a[1], c[2] - a[2]];
            const p = cross(dir, e2);
            const det = dot(e1, p);
            if (Math.abs(det) < EPS) return null;

            const invDet = 1 / det;
            const tvec = [origin[0] - a[0], origin[1] - a[1], origin[2] - a[2]];
            const u = dot(tvec, p) * invDet;
            if (u < 0 || u > 1) return null;

            const q = cross(tvec, e1);
            const v = dot(dir, q) * invDet;
            if (v < 0 || u + v > 1) return null;

            const t = dot(e2, q) * invDet;
            return t > EPS ? t : null;
        }

        function distancePointToRay(point, origin, dir) {
            const op = [point[0] - origin[0], point[1] - origin[1], point[2] - origin[2]];
            const t = Math.max(0, dot(op, dir));
            const closest = [origin[0] + dir[0] * t, origin[1] + dir[1] * t, origin[2] + dir[2] * t];
            return Math.hypot(point[0] - closest[0], point[1] - closest[1], point[2] - closest[2]);
        }

        function project(p) {
            const clip = transformVec4(viewProjection, [p[0], p[1], p[2], 1]);
            const ndcX = clip[0] / clip[3];
            const ndcY = clip[1] / clip[3];
            const ndcZ = clip[2] / clip[3];
            return {
                x: (ndcX * 0.5 + 0.5) * widthPx,
                y: (1 - (ndcY * 0.5 + 0.5)) * heightPx,
                depth: ndcZ
            };
        }

        function unproject(px, py, depth) {
            const x = (px / widthPx) * 2 - 1;
            const y = 1 - (py / heightPx) * 2;
            return transformPoint(invViewProjection, [x, y, depth]);
        }

        function makeDisc(steps) {
            const verts = new Float32Array((steps + 2) * 2);
            verts[0] = 0;
            verts[1] = 0;
            for (let i = 0; i <= steps; i++) {
                const a = (i / steps) * Math.PI * 2;
                verts[(i + 1) * 2 + 0] = Math.cos(a);
                verts[(i + 1) * 2 + 1] = Math.sin(a);
            }
            return verts;
        }

        function makeShadowMatrix() {
            const m = identity();
            m[0] = 0.92;
            m[5] = 0.04;
            m[10] = 0.2;
            m[12] = 0.32;
            m[13] = -3.28;
            m[14] = -1.05;
            m[4] = -0.18;
            m[8] = 0.11;
            return m;
        }

        function makeProgram(vs, fs) {
            const program = gl.createProgram();
            const v = compile(gl.VERTEX_SHADER, vs);
            const f = compile(gl.FRAGMENT_SHADER, fs);
            gl.attachShader(program, v);
            gl.attachShader(program, f);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                throw new Error(gl.getProgramInfoLog(program));
            }

            const attribs = {};
            const uniforms = {};
            const nAttribs = gl.getProgramParameter(program, gl.ACTIVE_ATTRIBUTES);
            const nUniforms = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);

            for (let i = 0; i < nAttribs; i++) {
                const info = gl.getActiveAttrib(program, i);
                attribs[info.name] = gl.getAttribLocation(program, info.name);
            }

            for (let i = 0; i < nUniforms; i++) {
                const info = gl.getActiveUniform(program, i);
                uniforms[info.name] = gl.getUniformLocation(program, info.name);
            }

            return { program, attribs, uniforms };

            function compile(type, src) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, src);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    throw new Error(gl.getShaderInfoLog(shader));
                }
                return shader;
            }
        }

        function bindAttrib(program, name, buffer, size) {
            const loc = program.attribs[name];
            if (loc === undefined || loc < 0) return;
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.enableVertexAttribArray(loc);
            gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
        }

        function mat4() {
            return new Float32Array(16);
        }

        function identity() {
            const m = mat4();
            m[0] = 1;
            m[5] = 1;
            m[10] = 1;
            m[15] = 1;
            return m;
        }

        function perspective(out, fovy, aspect, near, far) {
            const f = 1 / Math.tan(fovy / 2);
            out[0] = f / aspect;
            out[1] = 0;
            out[2] = 0;
            out[3] = 0;

            out[4] = 0;
            out[5] = f;
            out[6] = 0;
            out[7] = 0;

            out[8] = 0;
            out[9] = 0;
            out[11] = -1;

            out[12] = 0;
            out[13] = 0;
            out[15] = 0;

            if (far != null && far !== Infinity) {
                const nf = 1 / (near - far);
                out[10] = (far + near) * nf;
                out[14] = 2 * far * near * nf;
            } else {
                out[10] = -1;
                out[14] = -2 * near;
            }
            return out;
        }

        function lookAt(out, eye, center, up) {
            let zx = eye[0] - center[0];
            let zy = eye[1] - center[1];
            let zz = eye[2] - center[2];
            let len = Math.hypot(zx, zy, zz);
            zx /= len; zy /= len; zz /= len;

            let xx = up[1] * zz - up[2] * zy;
            let xy = up[2] * zx - up[0] * zz;
            let xz = up[0] * zy - up[1] * zx;
            len = Math.hypot(xx, xy, xz);
            xx /= len; xy /= len; xz /= len;

            let yx = zy * xz - zz * xy;
            let yy = zz * xx - zx * xz;
            let yz = zx * xy - zy * xx;

            out[0] = xx;
            out[1] = yx;
            out[2] = zx;
            out[3] = 0;

            out[4] = xy;
            out[5] = yy;
            out[6] = zy;
            out[7] = 0;

            out[8] = xz;
            out[9] = yz;
            out[10] = zz;
            out[11] = 0;

            out[12] = -(xx * eye[0] + xy * eye[1] + xz * eye[2]);
            out[13] = -(yx * eye[0] + yy * eye[1] + yz * eye[2]);
            out[14] = -(zx * eye[0] + zy * eye[1] + zz * eye[2]);
            out[15] = 1;
            return out;
        }

        function multiply(out, a, b) {
            const a00 = a[0], a01 = a[1], a02 = a[2], a03 = a[3];
            const a10 = a[4], a11 = a[5], a12 = a[6], a13 = a[7];
            const a20 = a[8], a21 = a[9], a22 = a[10], a23 = a[11];
            const a30 = a[12], a31 = a[13], a32 = a[14], a33 = a[15];

            let b0 = b[0], b1 = b[1], b2 = b[2], b3 = b[3];
            out[0] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
            out[1] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
            out[2] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
            out[3] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;

            b0 = b[4]; b1 = b[5]; b2 = b[6]; b3 = b[7];
            out[4] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
            out[5] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
            out[6] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
            out[7] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;

            b0 = b[8]; b1 = b[9]; b2 = b[10]; b3 = b[11];
            out[8] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
            out[9] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
            out[10] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
            out[11] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;

            b0 = b[12]; b1 = b[13]; b2 = b[14]; b3 = b[15];
            out[12] = b0 * a00 + b1 * a10 + b2 * a20 + b3 * a30;
            out[13] = b0 * a01 + b1 * a11 + b2 * a21 + b3 * a31;
            out[14] = b0 * a02 + b1 * a12 + b2 * a22 + b3 * a32;
            out[15] = b0 * a03 + b1 * a13 + b2 * a23 + b3 * a33;
            return out;
        }

        function invert(out, a) {
            const a00 = a[0], a01 = a[1], a02 = a[2], a03 = a[3];
            const a10 = a[4], a11 = a[5], a12 = a[6], a13 = a[7];
            const a20 = a[8], a21 = a[9], a22 = a[10], a23 = a[11];
            const a30 = a[12], a31 = a[13], a32 = a[14], a33 = a[15];

            const b00 = a00 * a11 - a01 * a10;
            const b01 = a00 * a12 - a02 * a10;
            const b02 = a00 * a13 - a03 * a10;
            const b03 = a01 * a12 - a02 * a11;
            const b04 = a01 * a13 - a03 * a11;
            const b05 = a02 * a13 - a03 * a12;
            const b06 = a20 * a31 - a21 * a30;
            const b07 = a20 * a32 - a22 * a30;
            const b08 = a20 * a33 - a23 * a30;
            const b09 = a21 * a32 - a22 * a31;
            const b10 = a21 * a33 - a23 * a31;
            const b11 = a22 * a33 - a23 * a32;

            let det = b00 * b11 - b01 * b10 + b02 * b09 + b03 * b08 - b04 * b07 + b05 * b06;
            det = 1 / det;

            out[0] = (a11 * b11 - a12 * b10 + a13 * b09) * det;
            out[1] = (a02 * b10 - a01 * b11 - a03 * b09) * det;
            out[2] = (a31 * b05 - a32 * b04 + a33 * b03) * det;
            out[3] = (a22 * b04 - a21 * b05 - a23 * b03) * det;
            out[4] = (a12 * b08 - a10 * b11 - a13 * b07) * det;
            out[5] = (a00 * b11 - a02 * b08 + a03 * b07) * det;
            out[6] = (a32 * b02 - a30 * b05 - a33 * b01) * det;
            out[7] = (a20 * b05 - a22 * b02 + a23 * b01) * det;
            out[8] = (a10 * b10 - a11 * b08 + a13 * b06) * det;
            out[9] = (a01 * b08 - a00 * b10 - a03 * b06) * det;
            out[10] = (a30 * b04 - a31 * b02 + a33 * b00) * det;
            out[11] = (a21 * b02 - a20 * b04 - a23 * b00) * det;
            out[12] = (a11 * b07 - a10 * b09 - a12 * b06) * det;
            out[13] = (a00 * b09 - a01 * b07 + a02 * b06) * det;
            out[14] = (a31 * b01 - a30 * b03 - a32 * b00) * det;
            out[15] = (a20 * b03 - a21 * b01 + a22 * b00) * det;
            return out;
        }

        function transformVec4(m, v) {
            return [
                m[0] * v[0] + m[4] * v[1] + m[8] * v[2] + m[12] * v[3],
                m[1] * v[0] + m[5] * v[1] + m[9] * v[2] + m[13] * v[3],
                m[2] * v[0] + m[6] * v[1] + m[10] * v[2] + m[14] * v[3],
                m[3] * v[0] + m[7] * v[1] + m[11] * v[2] + m[15] * v[3]
            ];
        }

        function transformPoint(m, p) {
            const v = transformVec4(m, [p[0], p[1], p[2], 1]);
            return [v[0] / v[3], v[1] / v[3], v[2] / v[3]];
        }

        function normalize3(v) {
            const len = Math.hypot(v[0], v[1], v[2]) || 1;
            return [v[0] / len, v[1] / len, v[2] / len];
        }

        function dot(a, b) {
            return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }

        function cross(a, b) {
            return [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ];
        }
    })();
</script>
