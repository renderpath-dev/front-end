<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020812" />
    <link rel="icon" href="/vite.svg" />
    <title>React + TypeScript Learning Lab</title>
    <script>
      ;(() => {
        const storageKey = 'learning-lab-theme:v1'
        let savedTheme = null

        try {
          savedTheme = window.localStorage.getItem(storageKey)
        } catch {
          savedTheme = null
        }

        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light'
        const initialTheme =
          savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : systemTheme

        document.documentElement.dataset.theme = initialTheme
        document.documentElement.style.colorScheme = initialTheme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/sudoku/main.tsx"></script>
  </body>
</html>
